name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'src/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linter
        run: uv run ruff check

      - name: Check formatting
        run: uv run ruff format --check

  push-image:
    needs: [lint, changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.app == 'true'
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/cd-deploy-gar.yml@main
    with:
      repository: ${{ vars.GCP_PROJECT_ID }}/iris/iris
      gcp-region: asia-southeast1
      project-id: ${{ vars.GCP_PROJECT_ID }}
    secrets:
      wif-provider: ${{ secrets.GCP_WIF_PROVIDER }}
      service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    permissions:
      contents: read
      id-token: write
